<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>BlockOne987 Knowledge Graph</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000; 
            color: #0f0; 
            font-family: 'Fira Code', 'Courier New', monospace;
            overflow: hidden;
        }
        #graph { width: 100vw; height: 100vh; }
        .link { stroke: #00ff41; stroke-opacity: 0.4; }
        .node circle { fill: #00ff41; cursor: pointer; transition: all 0.2s; }
        .node:hover circle { fill: #00fff5; r: 12; }
        .node text { 
            fill: #00ff41; 
            font-size: 11px; 
            pointer-events: none;
            text-shadow: 0 0 3px #000;
        }
        .node:hover text { fill: #00fff5; }
        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #00ff41;
            padding: 15px;
            border-radius: 8px;
        }
        .controls h3 { margin-bottom: 10px; font-size: 14px; letter-spacing: 2px; }
        .controls p { font-size: 11px; opacity: 0.7; margin: 5px 0; }
        .legend {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>GRAPH CONTROLS</h3>
        <p>Scroll: Zoom in/out</p>
        <p>Drag background: Pan</p>
        <p>Drag node: Move node</p>
        <p>Click node: Show details</p>
    </div>
    <div id="graph"></div>
    <div class="legend">BlockOne987 Knowledge Graph | 32 nodes | 20 edges</div>
    
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    const nodes = [
        {"id": "tools_genai_inspect_safetensors_py", "label": "inspect_safetensors.py", "group": 0},
        {"id": "inspect_safetensors_ensure_dependencies", "label": "ensure_dependencies()", "group": 0},
        {"id": "inspect_safetensors_get_safe_tensor_location", "label": "get_safe_tensor_location()", "group": 0},
        {"id": "inspect_safetensors_display_tensor_keys", "label": "display_tensor_keys()", "group": 0},
        {"id": "inspect_safetensors_display_tensor_metadata", "label": "display_tensor_metadata()", "group": 0},
        {"id": "inspect_safetensors_main", "label": "main()", "group": 0},
        {"id": "webgl_context", "label": "WebGL Context", "group": 0},
        {"id": "canvas_element", "label": "Canvas Element", "group": 0},
        {"id": "vertex_shader", "label": "Vertex Shader", "group": 0},
        {"id": "fragment_shader", "label": "Fragment Shader", "group": 0},
        {"id": "matrix_rain_effect", "label": "Matrix Rain Effect", "group": 0},
        {"id": "shader_program", "label": "Shader Program", "group": 0},
        {"id": "gpu_accelerated_graphics", "label": "GPU Accelerated Graphics", "group": 0},
        {"id": "slideDown_animation", "label": "SlideDown Animation", "group": 0},
        {"id": "glitch_animation", "label": "Glitch Animation", "group": 0},
        {"id": "fadeIn_animation", "label": "FadeIn Animation", "group": 0},
        {"id": "pulse_animation", "label": "Pulse Animation", "group": 0},
        {"id": "cardIn_animation", "label": "CardIn Animation", "group": 0},
        {"id": "crt_scanlines", "label": "CRT Scanlines Effect", "group": 0},
        {"id": "custom_cursor", "label": "Custom Cursor", "group": 0},
        {"id": "mouse_tracking", "label": "Mouse Tracking", "group": 0},
        {"id": "live_coordinates", "label": "Live Coordinates Display", "group": 0},
        {"id": "click_glitch_effect", "label": "Click Glitch Effect", "group": 0},
        {"id": "sitemap", "label": "Developer Sitemap", "group": 0},
        {"id": "projects_page", "label": "Projects Page", "group": 0},
        {"id": "tools_page", "label": "Tools Page", "group": 0},
        {"id": "snippets_page", "label": "Snippets Page", "group": 0},
        {"id": "docs_page", "label": "Docs Page", "group": 0},
        {"id": "blog_page", "label": "Blog Page", "group": 0},
        {"id": "labs_page", "label": "Labs Page", "group": 0},
        {"id": "github_page", "label": "GitHub Page", "group": 0},
        {"id": "contact_section", "label": "Contact Section", "group": 0}
    ];
    
    const links = [
        {"source": "webgl_context", "target": "vertex_shader", "relation": "uses"},
        {"source": "webgl_context", "target": "fragment_shader", "relation": "uses"},
        {"source": "fragment_shader", "target": "matrix_rain_effect", "relation": "implements"},
        {"source": "canvas_element", "target": "webgl_context", "relation": "depends_on"},
        {"source": "canvas_element", "target": "matrix_rain_effect", "relation": "depends_on"},
        {"source": "custom_cursor", "target": "mouse_tracking", "relation": "depends_on"},
        {"source": "live_coordinates", "target": "mouse_tracking", "relation": "depends_on"},
        {"source": "click_glitch_effect", "target": "glitch_animation", "relation": "relates_to"},
        {"source": "sitemap", "target": "projects_page", "relation": "contains"},
        {"source": "sitemap", "target": "tools_page", "relation": "contains"},
        {"source": "sitemap", "target": "snippets_page", "relation": "contains"},
        {"source": "sitemap", "target": "docs_page", "relation": "contains"},
        {"source": "sitemap", "target": "blog_page", "relation": "contains"},
        {"source": "sitemap", "target": "labs_page", "relation": "contains"},
        {"source": "sitemap", "target": "github_page", "relation": "contains"},
        {"source": "sitemap", "target": "contact_section", "relation": "contains"},
        {"source": "inspect_safetensors_main", "target": "inspect_safetensors_ensure_dependencies", "relation": "calls"},
        {"source": "inspect_safetensors_main", "target": "inspect_safetensors_get_safe_tensor_location", "relation": "calls"},
        {"source": "inspect_safetensors_main", "target": "inspect_safetensors_display_tensor_keys", "relation": "calls"},
        {"source": "inspect_safetensors_main", "target": "inspect_safetensors_display_tensor_metadata", "relation": "calls"}
    ];
    
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    const svg = d3.select("#graph")
        .append("svg")
        .attr("width", width)
        .attr("height", height)
        .attr("viewBox", [0, 0, width, height]);
    
    // Add zoom behavior
    const g = svg.append("g");
    
    const zoom = d3.zoom()
        .scaleExtent([0.2, 4])
        .on("zoom", (event) => g.attr("transform", event.transform));
    
    svg.call(zoom);
    
    // Initial zoom to fit
    svg.call(zoom.transform, d3.zoomIdentity.translate(width/4, height/4).scale(0.8));
    
    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(100))
        .force("charge", d3.forceManyBody().strength(-300))
        .force("center", d3.forceCenter(width/2, height/2))
        .force("collision", d3.forceCollide().radius(30));
    
    // Draw links
    const link = g.append("g")
        .selectAll("line")
        .data(links)
        .join("line")
        .attr("class", "link")
        .attr("stroke-width", 1.5);
    
    // Draw nodes
    const node = g.append("g")
        .selectAll("g")
        .data(nodes)
        .join("g")
        .attr("class", "node")
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended));
    
    node.append("circle")
        .attr("r", 10);
    
    node.append("text")
        .attr("dx", 15)
        .attr("dy", 4)
        .text(d => d.label);
    
    // Tooltip
    const tooltip = d3.select("body").append("div")
        .style("position", "fixed")
        .style("background", "rgba(0,20,0,0.95)")
        .style("border", "1px solid #00ff41")
        .style("padding", "10px")
        .style("border-radius", "5px")
        .style("font-size", "11px")
        .style("pointer-events", "none")
        .style("opacity", 0)
        .style("z-index", 1000);
    
    // Hover effects
    node.on("mouseenter", function(event, d) {
        const connected = links.filter(l => l.source.id === d.id || l.target.id === d.id);
        link.style("stroke", l => (l.source.id === d.id || l.target.id === d.id) ? "#00fff5" : "#00ff41")
            .style("stroke-opacity", l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.2);
        
        tooltip.style("opacity", 1)
            .html(`<strong>${d.label}</strong><br>Connections: ${connected.length}`)
            .style("left", (event.pageX + 15) + "px")
            .style("top", (event.pageY - 10) + "px");
    })
    .on("mouseleave", function() {
        link.style("stroke", "#00ff41").style("stroke-opacity", 0.4);
        tooltip.style("opacity", 0);
    });
    
    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);
        
        node.attr("transform", d => `translate(${d.x},${d.y})`);
    });
    
    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }
    
    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }
    
    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }
    
    // Keyboard controls
    d3.select("body").on("keydown", (event) => {
        const step = 50;
        if (event.key === "ArrowRight") svg.transition().call(zoom.translateBy, step/zoom.scale(), 0);
        if (event.key === "ArrowLeft") svg.transition().call(zoom.translateBy, -step/zoom.scale(), 0);
        if (event.key === "ArrowUp") svg.transition().call(zoom.translateBy, 0, -step/zoom.scale());
        if (event.key === "ArrowDown") svg.transition().call(zoom.translateBy, 0, step/zoom.scale());
        if (event.key === "+" || event.key === "=") svg.transition().call(zoom.scaleBy, 1.3);
        if (event.key === "-") svg.transition().call(zoom.scaleBy, 0.7);
        if (event.key === "0") svg.transition().call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2).scale(1));
    });
    </script>
</body>
</html>
